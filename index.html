<!DOCTYPE html>
<html>

<head>
    <title>AI Study Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>📚 AI Study Assistant</h1>
        <p>Learn Smarter with AI ✨</p>

        <!-- SINGLE INPUT ONLY -->
        <textarea id="notes" placeholder="Paste study notes or ask a question..."></textarea>
        
        <br><br>

<h3>📂 Upload PDF</h3>

<input type="file" id="pdfFile">

<br><br>

<button id="pdfBtn">📄 Process PDF</button>
        <!-- BUTTONS -->

        <div class="buttons">

            <button id="summarizeBtn">✨ Summarize</button>

<button id="quizBtn">❓ Quiz</button>

<button id="explainBtn">🧠 Explain</button>

<button id="formBtn">📋 Form</button>

<button id="askBtn">💬 Ask AI</button>

<button id="flashBtn">🃏 Flashcards</button>


        </div>

        <h2>📄 AI Response</h2>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
